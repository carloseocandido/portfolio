      content="#070a13"
      media="(prefers-color-scheme: dark)"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Carlos | Backend Developer" />
    <meta property="og:title" content="Carlos | Backend Developer" />

      property="og:description"
      content="Portfólio premium para Backend Developer especializado em Node.js, TypeScript, PostgreSQL, MySQL, Drizzle ORM, Docker e testes automatizados."

    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="manifest" href="/site.webmanifest" />
    <title>Carlos | Backend Developer</title>
    <script>
      (() => {
        const storageKey = "theme-preference";
        const storedTheme = localStorage.getItem(storageKey);
        if (storedTheme === "light" || storedTheme === "dark") {
          document.documentElement.dataset.theme = storedTheme;
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@0..1,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
